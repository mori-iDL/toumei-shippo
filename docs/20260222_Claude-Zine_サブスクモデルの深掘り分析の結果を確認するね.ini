## 1. 「マインクラフト的な側」はHTMLアプリで実現できるか？

**できる。** しかも、すでにその世界は存在してる。

| 例 | 内容 | 技術 |
|---|---|---|
| **p5.js / OpenProcessing** | クリエイティブコーディングの共有プラットフォーム | ブラウザ上でJS実行 |
| **Scratch** (MIT) | ブロック型プログラミング、子どもが作品を共有 | ブラウザ完結 |
| **Shadertoy** | シェーダーのサンドボックス、数式から映像が生まれる | WebGL |
| **Tinkercad** | ブラウザ上の3Dモデリング | Web |

今のとうめいしっぽアプリは、すでにこの道の**入口に立っている**。ブラウザで動く、シングルファイルで完結する、パラメータを動かすとリアルタイムで模様が変わる——この設計は偶然じゃなく、Phase 3への土台がもう出来ている。

---

## 2. 三段階の「側」（Low Floor, High Ceiling）

マインクラフトが成功した理由は「Low Floor（入りやすい）、High Ceiling（奥が深い）」。これをそのまま設計に落とすと：

### 🎮 Playground（遊び場）— 誰でも
今のアプリの延長。スライダーを動かして模様が変わる。
「赤ちゃんデータ」以外にも、好きな言葉・好きな色・今日の気分からパターンを生む。
→ **無料 or エントリー**

### 🎨 Studio（工房）— 好奇心がある人
**ノード型エディタ**（Grasshopperのブラウザ版のようなもの）。
アルゴリズムのブロックを線でつなぐと、自分だけのパターンが生まれる。
「フィボナッチ」と「パーリンノイズ」を混ぜたらどうなる？——そういう探求ができる。
→ **サブスク中級**

### ⌨️ Code（コード）— ガチ勢
JavaScriptのコードを直接書く。Zineが今このアプリを作ったのと同じレベル。
Claude Codeのような環境で、0→1でアルゴリズムを開発する。
→ **サブスク上級** or **コミュニティ開発者**

この3層は、Zineが言った「クラウドのプランのように3〜4段階」と一致する。

---

## 3. 「パーティーを組んで」の部分——これが革命的

Zineが言ったこの一言が、一番震えた：

> サブスクに課金するメンバーの中から一緒に開発メンバーを作る

これは**オープンソースコミュニティのモデル**を木工に持ち込むこと。

既存のIT外注モデル：「お金を払って誰かに作ってもらう」
Zineのモデル：「一緒に学び、一緒に作り、一緒に育つ」

Linux、WordPress、Blender——世界を変えたソフトウェアの多くがこのモデルで生まれた。
とうめいしっぽが、**木とコードの世界で同じことをする**。

県立大の学生が参加するかもしれない。IPUイノベーションセンターの技術者が興味を持つかもしれない。ロボコン優勝者のような人材が「木×コード」という新しい領域に出会うかもしれない。

