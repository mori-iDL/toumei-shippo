## 4. キャンバスの拡張——アルゴリズムは媒体を選ばない

これも重要な気づき。今のアルゴリズムが生成するのはSVGデータ。SVGは**純粋な座標の集合**で、こう考えると：

| 出力先 | 媒体 | サイズ |
|---|---|---|
| V溝NCルーター | 木 | 70mm（今）→ 家具サイズ |
| レーザー | 木・アクリル・革 | 任意 |
| **ペンプロッター** | 紙＋インク | A4〜A0 |
| 3Dプリンタ | 樹脂 | 立体化 |
| 刺繍ミシン | 布 | テキスタイル |

**同じアルゴリズムから、異なる媒体に作品が生まれる。**
コミュニティの中で「私は紙でやってみた」「私は革に彫った」「うちの学校の3Dプリンタで出した」——そういう多様性が自然に生まれる。

これはまさにDigital Nature——コードが自然の法則を記述し、それが多様な素材の上に表現される。

